# detekt overrides — applied on top of the default config
# (run with: detekt --config config/detekt/detekt.yml --build-upon-default-config).
# Only Compose-specific accommodations live here; everything else uses detekt defaults.

complexity:
  LongParameterList:
    # Stateless @Composable screens idiomatically take state + several callbacks.
    ignoreAnnotated: ['Composable']

naming:
  FunctionNaming:
    # @Composable functions are PascalCase by Jetpack Compose convention.
    ignoreAnnotated: ['Composable']

style:
  # Single line-length policy across tools: match .editorconfig (ktlint) max_line_length = 140.
  MaxLineLength:
    maxLineLength: 140
  MagicNumber:
    # Color/dimension literals in declarations (e.g. Color(0xFF...)) are idiomatic.
    ignorePropertyDeclaration: true
    ignoreAnnotated: ['Composable']
