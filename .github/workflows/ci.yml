name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Unit tests + lint (just ci)
    # arm64 macOS: flake.nix only exposes a devShell for aarch64-darwin, so CI runs the
    # exact same Nix environment used for local development (fully reproducible).
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Declarative Android SDK comes from the flake (/nix/store) — no sdkmanager license step.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Gradle (Maven deps + wrapper)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Same strict gate developers run locally: unit tests + ktlint + detekt + Android lint.
      - name: just ci
        run: nix develop --command just ci

      - name: Upload test & lint reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
